app = "wadigest-server"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  SESSIONS_DIR = "/sessions"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 200
    soft_limit = 150

[mounts]
  source = "wadigest_sessions"
  destination = "/sessions"
  initial_size = "1gb"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
